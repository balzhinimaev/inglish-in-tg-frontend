name: Build and Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL || vars.VITE_API_BASE_URL || 'https://englishintg.ru' }}
            VITE_ENABLE_ANALYTICS=${{ vars.VITE_ENABLE_ANALYTICS || 'true' }}
            VITE_ENABLE_DEBUG_LOGGING=${{ vars.VITE_ENABLE_DEBUG_LOGGING || 'false' }}
            NODE_ENV=production
            APP_PORT=${{ vars.APP_PORT || '8004' }}
            VITE_BOT_USERNAME=${{ vars.VITE_BOT_USERNAME || 'EnglishINtg_bot' }}
            VITE_TELEGRAM_WEB_APP_URL=${{ vars.VITE_TELEGRAM_WEB_APP_URL || 'https://t.me/EnglishINtg_bot/webapp' }}

  deploy:
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -euo pipefail

            APP_NAME="${{ vars.APP_NAME || 'inglish-frontend' }}"
            APP_PORT="${{ vars.APP_PORT || '8004' }}"
            DEPLOY_PATH="${{ vars.DEPLOY_PATH || '/home/clawd/apps/inglish-in-tg-frontend' }}"
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

            echo "🚀 Deploying ${IMAGE}"
            echo "📦 App: ${APP_NAME}"
            echo "🔌 Port: ${APP_PORT}"
            echo "📁 Path: ${DEPLOY_PATH}"

            mkdir -p "${DEPLOY_PATH}"
            cd "${DEPLOY_PATH}"

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull "${IMAGE}"

            docker rm -f "${APP_NAME}" || true

            docker run -d \
              --name "${APP_NAME}" \
              --restart unless-stopped \
              -p "${APP_PORT}:${APP_PORT}" \
              -e APP_PORT="${APP_PORT}" \
              -e NODE_ENV=production \
              "${IMAGE}"

            for i in $(seq 1 20); do
              if curl -fsS "http://127.0.0.1:${APP_PORT}/" >/dev/null; then
                echo "✅ Frontend is healthy on ${APP_PORT}"
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "❌ Frontend failed health check"
                docker logs "${APP_NAME}" || true
                exit 1
              fi
              sleep 2
            done

            echo "🎉 Deploy completed"